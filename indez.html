<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Zaj"/>
<title>Zaj</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#0d1117;color:#e8eaf0}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2a3045;border-radius:4px}

/* SCREENS */
#screen-login{
  min-height:100vh;background:#0d1117;
  display:flex;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;
}
#screen-chat{
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  background:#0d1117;overflow:hidden;
}
.hidden{display:none!important}

/* LOGIN */
.login-wrap{width:100%;max-width:400px}
.logo-box{text-align:center;margin-bottom:30px}
.logo-icon{
  width:72px;height:72px;border-radius:24px;margin:0 auto 14px;
  background:linear-gradient(135deg,#6C63FF,#FF6B9D);
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 8px 32px rgba(108,99,255,.4);
}
.logo-title{font-weight:900;font-size:28px;color:#f0f1f5;letter-spacing:-0.5px}
.logo-sub{color:#3a4560;font-size:13px;margin-top:5px}
.card{background:#161b27;border-radius:20px;padding:24px;border:1px solid #1f2535;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.label{color:#5a6480;font-size:12px;font-weight:700;letter-spacing:.5px;display:block;margin-bottom:7px}
.inp{
  background:#1e2638;border:1.5px solid #2a3450;border-radius:12px;
  padding:12px 16px;color:#e8eaf0;
  font-family:inherit;font-size:15px;width:100%;outline:none;
  transition:border .2s;
}
.inp:focus{border-color:#6C63FF}
.inp::placeholder{color:#3a4560}
.divider{height:1px;background:#1f2535;margin:20px 0}
.or{color:#2a3450;text-align:center;font-size:13px;margin-bottom:12px;font-weight:600}
.btn{
  padding:13px 0;border-radius:13px;border:none;cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:800;width:100%;
  transition:all .2s;letter-spacing:.3px;display:block;
}
.btn+.btn{margin-top:10px}
.btn-primary{background:linear-gradient(135deg,#6C63FF,#8B6AFF);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,.35);margin-bottom:12px}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:#1e2638;color:#8896b0;border:1.5px solid #2a3450}
.btn-secondary:active{opacity:.8}
.inp-code{letter-spacing:4px;text-align:center;font-weight:800;font-size:17px;margin-bottom:12px}
.err{margin-top:12px;color:#FF6348;font-size:13px;text-align:center;font-weight:600}
.note{text-align:center;margin-top:16px;color:#2a3450;font-size:11px;line-height:1.6}

/* CHAT HEADER */
.chat-header{
  background:#161b27;border-bottom:1px solid #1f2535;
  padding:10px 14px;flex-shrink:0;
}
.header-top{display:flex;align-items:center;gap:10px}
.header-logo{
  width:38px;height:38px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,#6C63FF,#FF6B9D);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.header-info{flex:1;min-width:0}
.header-title{font-weight:900;font-size:15px;color:#f0f1f5}
.header-title span{color:#6C63FF;letter-spacing:2px}
.header-sub{font-size:11px;color:#3a4560;margin-top:1px}
.header-btns{display:flex;gap:6px;flex-shrink:0}
.copy-btn{
  cursor:pointer;padding:5px 10px;border-radius:8px;
  border:1.5px solid #2a3450;background:#1e2638;
  color:#6C63FF;font-family:inherit;font-size:11px;font-weight:700;
  transition:all .2s;white-space:nowrap;
}
.copy-btn:active{background:#6C63FF;color:#fff}
.leave-btn{
  cursor:pointer;padding:5px 10px;border-radius:8px;
  border:1.5px solid #2a3450;background:transparent;
  color:#FF6348;font-family:inherit;font-size:11px;font-weight:700;
  transition:all .2s;white-space:nowrap;
}
.leave-btn:active{background:#FF6348;color:#fff}
.members-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.member-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px 3px 4px;border-radius:20px;
  background:#1e2638;font-size:11px;font-weight:600;
}
.member-avatar{
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:#fff;flex-shrink:0;position:relative;
}
.online-dot{
  position:absolute;bottom:-1px;right:-1px;
  width:5px;height:5px;border-radius:50%;
  background:#00C896;border:1.5px solid #1e2638;
}

/* MESSAGES */
.msgs-area{
  flex:1;overflow-y:auto;padding:12px 12px 8px;
  display:flex;flex-direction:column;gap:2px;
  background:radial-gradient(ellipse at 20% 50%,#13192a 0%,#0d1117 100%);
}
.msgs-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;color:#2a3450;
}
.msgs-empty-icon{font-size:46px}
.msgs-empty-title{font-weight:800;font-size:15px;color:#3a4560}
.msgs-empty-sub{font-size:12px;text-align:center;max-width:230px;line-height:1.6;color:#2a3550}

.sys-msg{
  text-align:center;margin:8px 0;
  display:flex;align-items:center;gap:8px;
}
.sys-line{flex:1;height:1px;background:#1f2535}
.sys-text{font-size:11px;color:#3a4560;background:#111520;padding:2px 10px;border-radius:20px;white-space:nowrap}

.msg-wrap{display:flex;flex-direction:column}
.msg-wrap.me{align-items:flex-end}
.msg-wrap.other{align-items:flex-start}
.msg-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;margin-left:3px}
.msg-avatar{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;flex-shrink:0;
}
.msg-name{font-size:12px;font-weight:700}
.msg-time-meta{font-size:10px;color:#2a3450}
.msg-bubble{
  max-width:76%;padding:9px 13px;
  font-size:14.5px;line-height:1.55;
  word-break:break-word;
}
.msg-bubble.me{
  border-radius:18px 18px 4px 18px;
  background:linear-gradient(135deg,#6C63FF,#8B6AFF);
  color:#fff;box-shadow:0 2px 14px rgba(108,99,255,.3);
}
.msg-bubble.other{
  border-radius:18px 18px 18px 4px;
  background:#1e2435;color:#d8dce8;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.msg-time-inner{
  display:flex;justify-content:flex-end;
  margin-top:3px;margin-bottom:-2px;
}
.msg-time-inner span{font-size:10.5px;color:#fff;opacity:.6}

@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
.msg-anim{animation:msgIn .2s cubic-bezier(.34,1.56,.64,1)}

/* TYPING */
.typing-wrap{display:flex;align-items:center;gap:8px;margin-top:6px;margin-left:3px}
.typing-bubble{
  background:#1e2435;border-radius:18px 18px 18px 4px;
  padding:9px 13px;display:flex;align-items:center;gap:5px;
}
.typing-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;background:#6C63FF;
  animation:typDot .8s infinite ease-in-out;
}
@keyframes typDot{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.1);opacity:1}}
.typing-label{font-size:12px;color:#5a6480;margin-left:3px}

/* EMOJI */
.emoji-panel{
  background:#161b27;border-top:1px solid #2a3045;
  padding:10px 12px;display:flex;flex-wrap:wrap;gap:2px;flex-shrink:0;
}
.emoji-btn{font-size:24px;padding:5px;cursor:pointer;border:none;background:none}
.emoji-btn:active{transform:scale(1.3)}

/* INPUT BAR */
.input-bar{
  padding:10px 12px;background:#161b27;
  border-top:1px solid #1f2535;flex-shrink:0;
  display:flex;align-items:flex-end;gap:8px;
}
.emoji-toggle{
  cursor:pointer;background:none;border:none;color:#e8eaf0;
  font-size:20px;padding:6px;opacity:.55;flex-shrink:0;
}
.emoji-toggle:active{opacity:1}
.inp-wrap{
  flex:1;background:#1e2435;border-radius:16px;
  padding:9px 14px;border:1.5px solid #2a3045;
  display:flex;align-items:flex-end;
}
.inp-textarea{
  background:transparent;border:none;outline:none;color:#e8eaf0;
  font-size:15px;font-family:inherit;resize:none;width:100%;
  line-height:1.5;max-height:120px;overflow-y:auto;
}
.inp-textarea::placeholder{color:#3a4560}
.send-btn{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;border:none;
  transition:all .18s;
}
.send-btn:active{transform:scale(.88)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="screen-login">
  <div class="login-wrap">
    <div class="logo-box">
      <div class="logo-icon">💬</div>
      <div class="logo-title">Zaj</div>
      <div class="logo-sub">Общайтесь в реальном времени</div>
    </div>
    <div class="card">
      <label class="label">ВАШЕ ИМЯ</label>
      <input class="inp" id="inp-name" placeholder="Как вас зовут?" autocomplete="off"/>
      <div class="divider"></div>
      <button class="btn btn-primary" id="btn-create">✨ Создать новую комнату</button>
      <div class="or">— или —</div>
      <input class="inp inp-code" id="inp-code" placeholder="КОД КОМНАТЫ" maxlength="8" autocomplete="off"/>
      <button class="btn btn-secondary" id="btn-join">Войти в комнату →</button>
      <div class="err hidden" id="login-err"></div>
    </div>
    <div class="note">Без регистрации • Данные в браузере</div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="screen-chat" class="hidden">
  <div class="chat-header">
    <div class="header-top">
      <div class="header-logo">💬</div>
      <div class="header-info">
        <div class="header-title">Zaj · <span id="hdr-code"></span></div>
        <div class="header-sub" id="hdr-sub">0 онлайн · 0 участников</div>
      </div>
      <div class="header-btns">
        <button class="copy-btn" id="btn-copy">📋 Копировать</button>
        <button class="leave-btn" id="btn-leave">Выйти</button>
      </div>
    </div>
    <div class="members-row" id="members-row"></div>
  </div>

  <div class="msgs-area" id="msgs-area">
    <div class="msgs-empty" id="msgs-empty">
      <div class="msgs-empty-icon">🔒</div>
      <div class="msgs-empty-title">Начните переписку</div>
      <div class="msgs-empty-sub" id="empty-sub">Отправьте код другу</div>
    </div>
  </div>

  <div class="emoji-panel hidden" id="emoji-panel"></div>

  <div class="input-bar">
    <button class="emoji-toggle" id="btn-emoji">🙂</button>
    <div class="inp-wrap">
      <textarea class="inp-textarea" id="msg-input" rows="1" placeholder="Написать сообщение..."></textarea>
    </div>
    <button class="send-btn" id="btn-send" style="background:#1e2435"></button>
  </div>
</div>

<script>
// ─── UTILS ───────────────────────────────────────────────────────────────────
const COLORS = ["#6C63FF","#FF6B9D","#00C896","#FF9F43","#54A0FF","#FF6348","#A55EEA","#26de81","#fd9644","#45aaf2"];
const EMOJIS = ["😀","😂","😍","🥰","😎","🤔","👍","👌","🎉","❤️","🔥","✨","💯","🙏","😭","🤣","😊","🫡","💪","🚀","🤩","😏","😤","🫶","🥳"];

function getColor(name){ return COLORS[name.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%COLORS.length]; }
function getInitials(name){ return name.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2)||"?"; }
function fmtTime(iso){
  const d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<86400000) return d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  if(diff<172800000) return "вчера";
  return d.toLocaleDateString("ru-RU",{day:"2-digit",month:"2-digit"});
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function randCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const PFX = "zaj-";
function lsGet(k){ try{return localStorage.getItem(PFX+k);}catch{return null;} }
function lsSet(k,v){ try{localStorage.setItem(PFX+k,v);}catch{} }
function loadRooms(){ try{const r=lsGet("rooms");return r?JSON.parse(r):[];}catch{return[];} }
function saveRooms(r){ lsSet("rooms",JSON.stringify(r)); }
function loadMsgs(rid){ try{const r=lsGet("m-"+rid);return r?JSON.parse(r):[];}catch{return[];} }
function saveMsgs(rid,m){ lsSet("m-"+rid,JSON.stringify(m)); }
function pingOnline(rid,uid2){ lsSet("on-"+rid+"-"+uid2,Date.now().toString()); }
function isOnline(rid,uid2){ const r=lsGet("on-"+rid+"-"+uid2);return r?(Date.now()-parseInt(r)<8000):false; }
function getTyping(rid){ try{const r=lsGet("ty-"+rid);return r?JSON.parse(r):[];}catch{return[];} }
function setTyping(rid,arr){ lsSet("ty-"+rid,JSON.stringify(arr)); }

// ─── STATE ────────────────────────────────────────────────────────────────────
let myId = lsGet("myid")||uid();
lsSet("myid", myId);
let myName="", roomId=null, pollTimer=null, typTimer=null, showEmoji=false;

// ─── DOM ──────────────────────────────────────────────────────────────────────
const $login   = document.getElementById("screen-login");
const $chat    = document.getElementById("screen-chat");
const $inpName = document.getElementById("inp-name");
const $inpCode = document.getElementById("inp-code");
const $loginErr= document.getElementById("login-err");
const $hdrCode = document.getElementById("hdr-code");
const $hdrSub  = document.getElementById("hdr-sub");
const $members = document.getElementById("members-row");
const $msgs    = document.getElementById("msgs-area");
const $empty   = document.getElementById("msgs-empty");
const $emptySub= document.getElementById("empty-sub");
const $emojiPanel = document.getElementById("emoji-panel");
const $msgInput= document.getElementById("msg-input");
const $btnSend = document.getElementById("btn-send");
const $btnEmoji= document.getElementById("btn-emoji");

// Build emoji panel
EMOJIS.forEach(em=>{
  const b=document.createElement("button");
  b.className="emoji-btn"; b.textContent=em;
  b.onclick=()=>{ $msgInput.value+=em; updateSendBtn(); $msgInput.focus(); };
  $emojiPanel.appendChild(b);
});

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function showErr(msg){ $loginErr.textContent="⚠️ "+msg; $loginErr.classList.remove("hidden"); }
function hideErr(){ $loginErr.classList.add("hidden"); }

document.getElementById("btn-create").onclick = ()=> joinRoom(true);
document.getElementById("btn-join").onclick   = ()=> joinRoom(false);
$inpCode.oninput = e=>{ e.target.value=e.target.value.toUpperCase(); };
$inpName.onkeydown = $inpCode.onkeydown = e=>{ if(e.key==="Enter") joinRoom(false); };

function joinRoom(createNew){
  const name = $inpName.value.trim();
  if(!name){ showErr("Введите имя"); return; }
  const code = createNew ? randCode() : $inpCode.value.trim().toUpperCase();
  if(!code){ showErr("Введите код комнаты"); return; }
  hideErr();

  let rooms = loadRooms();
  let room = rooms.find(r=>r.id===code);
  if(!room && !createNew){ showErr("Комната не найдена"); return; }
  if(!room) room={id:code,members:[],created:Date.now()};
  const me={id:myId,name,color:getColor(name)};
  room.members=[...room.members.filter(m=>m.id!==myId),me];
  rooms=[...rooms.filter(r=>r.id!==code),room];
  saveRooms(rooms);
  pingOnline(code,myId);

  myName=name; roomId=code;
  const msgs=loadMsgs(code);
  const sys={id:Date.now()+"s",type:"system",text:`${name} присоединился(ась) к чату`,ts:new Date().toISOString()};
  saveMsgs(code,[...msgs,sys]);

  // switch to chat
  $login.classList.add("hidden");
  $chat.classList.remove("hidden");
  $hdrCode.textContent=code;
  $emptySub.innerHTML=`Отправьте код <b style="color:#6C63FF">${code}</b> другу`;
  document.getElementById("btn-copy").onclick=()=>copyCode(code);

  renderAll();
  startPoll();
}

// ─── LEAVE ────────────────────────────────────────────────────────────────────
document.getElementById("btn-leave").onclick=()=>{
  clearInterval(pollTimer);
  const msgs=loadMsgs(roomId);
  const sys={id:Date.now()+"s",type:"system",text:`${myName} покинул(а) чат`,ts:new Date().toISOString()};
  saveMsgs(roomId,[...msgs,sys]);
  roomId=null; myName="";
  $chat.classList.add("hidden");
  $login.classList.remove("hidden");
  $inpName.value=""; $inpCode.value="";
  clearMsgsUI();
};

// ─── COPY CODE ────────────────────────────────────────────────────────────────
function copyCode(code){
  navigator.clipboard?.writeText(code).catch(()=>{});
  const btn=document.getElementById("btn-copy");
  btn.textContent="✓ Скопировано";
  setTimeout(()=>btn.textContent="📋 Копировать",2000);
}

// ─── POLL ─────────────────────────────────────────────────────────────────────
function startPoll(){
  clearInterval(pollTimer);
  pollTimer=setInterval(renderAll,1500);
}

function renderAll(){
  if(!roomId) return;
  pingOnline(roomId,myId);
  const msgs=loadMsgs(roomId);
  const rooms=loadRooms();
  const room=rooms.find(r=>r.id===roomId);
  const members=room?room.members:[];
  renderMembers(members);
  renderMsgs(msgs);
  renderTyping(members);
}

// ─── MEMBERS ──────────────────────────────────────────────────────────────────
function renderMembers(members){
  const onlineCount=members.filter(m=>isOnline(roomId,m.id)).length;
  $hdrSub.textContent=`${onlineCount} онлайн · ${members.length} участников`;
  $members.innerHTML="";
  members.forEach(m=>{
    const chip=document.createElement("div");
    chip.className="member-chip";
    const online=isOnline(roomId,m.id);
    chip.innerHTML=`
      <div class="member-avatar" style="background:${m.color}">
        ${getInitials(m.name)}
        ${online?'<div class="online-dot"></div>':''}
      </div>
      <span style="color:${m.id===myId?'#6C63FF':'#8896b0'}">${m.name}${m.id===myId?' (вы)':''}</span>
    `;
    $members.appendChild(chip);
  });
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
let lastMsgCount=0;

function clearMsgsUI(){
  $msgs.innerHTML='';
  $msgs.appendChild($empty);
  $empty.classList.remove("hidden");
  lastMsgCount=0;
}

function renderMsgs(msgs){
  if(msgs.length===lastMsgCount) return;
  lastMsgCount=msgs.length;

  // clear and rebuild
  while($msgs.firstChild) $msgs.removeChild($msgs.firstChild);

  if(msgs.length===0){
    $msgs.appendChild($empty);
    $empty.classList.remove("hidden");
    return;
  }
  $empty.classList.add("hidden");

  msgs.forEach((msg,i)=>{
    if(msg.type==="system"){
      const el=document.createElement("div");
      el.className="sys-msg";
      el.innerHTML=`<div class="sys-line"></div><span class="sys-text">${msg.text}</span><div class="sys-line"></div>`;
      $msgs.appendChild(el);
      return;
    }
    const isMe=msg.userId===myId;
    const prev=msgs[i-1];
    const sameSender=prev&&prev.userId===msg.userId&&prev.type!=="system";

    const wrap=document.createElement("div");
    wrap.className="msg-wrap msg-anim "+(isMe?"me":"other");
    wrap.style.marginTop=sameSender?"2px":"10px";

    if(!sameSender&&!isMe){
      const meta=document.createElement("div");
      meta.className="msg-meta";
      meta.innerHTML=`
        <div class="msg-avatar" style="background:${msg.color||getColor(msg.name||'')}">
          ${getInitials(msg.name||"?")}
        </div>
        <span class="msg-name" style="color:${msg.color||'#8896b0'}">${msg.name}</span>
        <span class="msg-time-meta">${fmtTime(msg.ts)}</span>
      `;
      wrap.appendChild(meta);
    }

    const bubble=document.createElement("div");
    bubble.className="msg-bubble "+(isMe?"me":"other");
    bubble.textContent=msg.text;

    if(isMe){
      const timeDiv=document.createElement("div");
      timeDiv.className="msg-time-inner";
      timeDiv.innerHTML=`<span>${fmtTime(msg.ts)}</span>`;
      bubble.appendChild(timeDiv);
    }
    wrap.appendChild(bubble);
    $msgs.appendChild(wrap);
  });

  // scroll to bottom
  $msgs.scrollTop=$msgs.scrollHeight;
}

// ─── TYPING ───────────────────────────────────────────────────────────────────
let typingEl=null;
function renderTyping(members){
  const arr=getTyping(roomId).filter(t=>Date.now()-t.ts<4000&&t.id!==myId);
  if(typingEl){ typingEl.remove(); typingEl=null; }
  if(arr.length===0) return;
  const names=arr.map(t=>t.name).join(", ");
  typingEl=document.createElement("div");
  typingEl.className="typing-wrap";
  typingEl.innerHTML=`
    <div class="typing-bubble">
      <div class="typing-dot" style="animation-delay:0s"></div>
      <div class="typing-dot" style="animation-delay:.2s"></div>
      <div class="typing-dot" style="animation-delay:.4s"></div>
      <span class="typing-label">${names} печатает…</span>
    </div>
  `;
  $msgs.appendChild(typingEl);
  $msgs.scrollTop=$msgs.scrollHeight;
}

// ─── SEND ─────────────────────────────────────────────────────────────────────
function sendMsg(){
  const text=$msgInput.value.trim();
  if(!text||!roomId) return;
  $msgInput.value="";
  $msgInput.style.height="auto";
  updateSendBtn();
  const msg={
    id:myId+"-"+Date.now(),
    userId:myId,name:myName,
    color:getColor(myName),
    text,
    ts:new Date().toISOString()
  };
  const current=loadMsgs(roomId);
  saveMsgs(roomId,[...current,msg]);
  // clear typing
  const arr=getTyping(roomId).filter(t=>t.id!==myId);
  setTyping(roomId,arr);
  renderAll();
}

$btnSend.onclick=sendMsg;
$msgInput.onkeydown=e=>{
  if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
};
$msgInput.oninput=e=>{
  e.target.style.height="auto";
  e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";
  updateSendBtn();
  if(!roomId) return;
  const arr=getTyping(roomId).filter(t=>t.id!==myId);
  arr.push({id:myId,name:myName,ts:Date.now()});
  setTyping(roomId,arr);
  clearTimeout(typTimer);
  typTimer=setTimeout(()=>{
    const a2=getTyping(roomId).filter(t=>t.id!==myId);
    setTyping(roomId,a2);
  },3000);
};

function updateSendBtn(){
  const has=$msgInput.value.trim().length>0;
  $btnSend.textContent=has?"➤":"🎤";
  $btnSend.style.background=has?"linear-gradient(135deg,#6C63FF,#8B6AFF)":"#1e2435";
  $btnSend.style.boxShadow=has?"0 4px 18px rgba(108,99,255,.4)":"none";
}

// ─── EMOJI TOGGLE ─────────────────────────────────────────────────────────────
$btnEmoji.onclick=()=>{
  showEmoji=!showEmoji;
  $emojiPanel.classList.toggle("hidden",!showEmoji);
  $btnEmoji.textContent=showEmoji?"😊":"🙂";
};
$msgs.onclick=()=>{
  if(showEmoji){ showEmoji=false; $emojiPanel.classList.add("hidden"); $btnEmoji.textContent="🙂"; }
};

updateSendBtn();
</script>
</body>
</html>
